<!-- Aluf UI Shell — foot_html_before -->
<div id="aluf-root"></div>
<script src="https://cdn.jsdelivr.net/gh/Yuki-az-23/aluf-frontend@c91e15d/dist/aluf-app.js"></script>
<script>
// Fallback: if React hasn't mounted after 12 seconds, show reload message
setTimeout(function() {
  var root = document.getElementById('aluf-root');
  if (root && !root.querySelector('[data-aluf-app]')) {
    document.body.classList.remove('aluf-loaded');
    root.innerHTML = '<div style="text-align:center;padding:40px;font-family:Heebo,sans-serif;">' +
      '<p style="font-size:18px;margin-bottom:16px;">שגיאה בטעינת האתר</p>' +
      '<a href="javascript:location.reload()" style="color:#FF6B00;font-weight:bold;">לחץ כאן לרענון</a></div>';
  }
}, 12000);
</script>
<noscript>
  <div style="text-align:center;padding:40px;font-family:Heebo,sans-serif;">
    <p>יש להפעיל JavaScript כדי לצפות באתר</p>
  </div>
</noscript>
